name: Validate Knowledge Base

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate-kb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run KB validator
        run: python scripts/validate_knowledge_base.py

  enforce-docx-regeneration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure docx regenerated when KB doc changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            RANGE="${BASE_SHA}...${HEAD_SHA}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            # Initial push edge case where before is all-zero SHA.
            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              echo "Initial push detected; skipping regeneration gate."
              exit 0
            fi
            RANGE="${BASE_SHA}...${HEAD_SHA}"
          fi

          CHANGED_FILES="$(git diff --name-only "$RANGE")"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          DOC_PATH="backend/chatbot/knowledge_base_document.txt"
          DOCX_PATH="docs/IIST_Admissions_KB.docx"

          DOC_CHANGED=0
          DOCX_CHANGED=0

          if echo "$CHANGED_FILES" | grep -Fxq "$DOC_PATH"; then
            DOC_CHANGED=1
          fi

          if echo "$CHANGED_FILES" | grep -Fxq "$DOCX_PATH"; then
            DOCX_CHANGED=1
          fi

          if [[ "$DOC_CHANGED" -eq 1 && "$DOCX_CHANGED" -ne 1 ]]; then
            echo "ERROR: $DOC_PATH changed but $DOCX_PATH was not updated."
            echo "Run: .venv/Scripts/python.exe scripts/build_kb_docx.py"
            exit 1
          fi

          echo "Regeneration gate passed."
